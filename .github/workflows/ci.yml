name: CI — Sparkle Movie

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dépendances
        run: pip install fastapi uvicorn pandas pydantic httpx pytest scikit-learn

      - name: Vérification de la structure du repository
        run: |
          echo "Vérification de l'arborescence obligatoire..."
          for path in api/main.py src/train_and_export.py src/export_profiles.py \
                      frontend/index.html docker-compose.yml requirements.txt \
                      tests/test_api.py data/movies.csv data/profiles.json; do
            if [ ! -f "$path" ]; then
              echo "ERREUR : $path absent du repository"
              exit 1
            fi
          done
          echo "OK : tous les fichiers requis sont présents."

      - name: Vérification syntaxe Python
        run: |
          python -m py_compile api/main.py
          python -m py_compile src/train_and_export.py
          python -m py_compile src/export_profiles.py
          echo "OK : aucune erreur de syntaxe."

      - name: Tests API (avec données mock)
        run: |
          python -c "
          import pandas as pd, json, os
          os.makedirs('data', exist_ok=True)

          # Créer un CSV minimal pour les tests
          pd.DataFrame({
              'userId': [1,1,1,2,2],
              'rank':   [1,2,3,1,2],
              'movieId':[318,527,858,1,2],
              'title':  ['Shawshank Redemption','Schindler List','Godfather','Toy Story','Jumanji'],
              'genres': ['Crime|Drama','Drama|War','Crime|Drama','Animation|Children','Adventure|Children'],
              'score':  [4.8,4.7,4.6,4.2,4.0]
          }).to_csv('data/recommendations.csv', index=False)

          # Créer un metrics minimal
          json.dump({'rmse':0.81,'coverage_pct':0.91,'n_users':200948,'n_movies':87585,'n_recommendations':5,'trained_at':'2026-01-01'}, open('data/model_metrics.json','w'))
          print('Données mock créées.')
          "
          pytest tests/ -v --tb=short

      - name: Vérification RMSE sur données mock
        run: |
          python - <<'EOF'
          import json, sys
          with open("data/model_metrics.json") as f:
              metrics = json.load(f)
          rmse = metrics["rmse"]
          if rmse >= 1.0:
              print(f"ECHEC : RMSE={rmse:.4f} >= seuil=1.0")
              sys.exit(1)
          print(f"OK : RMSE={rmse:.4f} < 1.0")
          EOF
