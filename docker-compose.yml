services:

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: sparkle-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data   # monte data/ pour refléter un réentraînement sans rebuild
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sparkle-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
